<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="108" fill="#1A2744"/>

  <!-- soft gold halo -->
  <circle cx="256" cy="252" r="156" fill="#C8943A" opacity="0.2"/>

  <!-- side signal arcs -->
  <path
    d="M152 268 C152 188 188 148 228 136"
    stroke="#C8943A"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
  />
  <path
    d="M360 268 C360 188 324 148 284 136"
    stroke="#C8943A"
    stroke-width="7"
    stroke-linecap="round"
    fill="none"
    opacity="0.9"
  />

  <!-- lantern canister -->
  <g stroke="#FFFFFF" stroke-linejoin="round">
    <!-- body -->
    <rect x="214" y="148" width="84" height="214" rx="14" stroke-width="10" fill="none"/>
    <!-- domed cap -->
    <path d="M214 160 C214 118 298 118 298 160" stroke-width="10" fill="none"/>
    <!-- base connector -->
    <rect x="202" y="356" width="108" height="26" rx="6" stroke-width="9" fill="none"/>
    <!-- chamber segments -->
    <line x1="214" y1="204" x2="298" y2="204" stroke-width="4" opacity="0.75"/>
    <line x1="214" y1="256" x2="298" y2="256" stroke-width="4" opacity="0.75"/>
    <line x1="214" y1="308" x2="298" y2="308" stroke-width="4" opacity="0.75"/>
  </g>

  <!-- molecular node -->
  <g fill="#D4A017" stroke="#D4A017" stroke-linecap="round">
    <line x1="256" y1="256" x2="224" y2="224" stroke-width="6"/>
    <circle cx="224" cy="224" r="10" fill="#D4A017"/>
    <line x1="256" y1="256" x2="288" y2="224" stroke-width="6"/>
    <circle cx="288" cy="224" r="10" fill="#D4A017"/>
    <line x1="256" y1="256" x2="224" y2="288" stroke-width="6"/>
    <circle cx="224" cy="288" r="10" fill="#D4A017"/>
    <line x1="256" y1="256" x2="288" y2="288" stroke-width="6"/>
    <circle cx="288" cy="288" r="10" fill="#D4A017"/>
    <circle cx="256" cy="256" r="15" fill="#D4A017"/>
  </g>
</svg>
